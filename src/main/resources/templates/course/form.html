<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>課程表單</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2>課程表單</h2>

    <div th:if="${duplicateError}" class="alert alert-danger" th:text="${duplicateError}"></div>

    <form th:action="@{/course/save}" th:object="${course}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>課程名稱</label>
            <input type="text" th:field="*{courseName}"
                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{courseName}"></div>
        </div>

        <div class="mb-3">
            <label>價格</label>
            <input type="number" th:field="*{price}"
                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label>類別</label>
            <select name="categoryId" class="form-control">
                <option value="">-- 請選擇類別 --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.categoryName}"
                        th:selected="${course.category != null && course.category.id == cat.id}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">儲存</button>
        <a th:href="@{/course/list}" class="btn btn-secondary">取消</a>
    </form>
</div>
</body>
</html>
