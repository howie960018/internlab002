<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>課程列表</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2>課程列表</h2>
    <a th:href="@{/course/form}" class="btn btn-primary mb-3">新增課程</a>

    <form th:action="@{/course/deleteBatch}" method="post">
        <div class="mb-3">
            <button type="submit" class="btn btn-danger">批次刪除</button>
        </div>

        <table class="table table-bordered">
        <thead>
            <tr>
                <th>選取</th>
                <th>ID</th>
                <th>課程名稱</th>
                <th>價格</th>
                <th>類別</th>
                <th>建立時間</th>
                <th>修改時間</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="course : ${courses}">
                <td>
                    <input type="checkbox" name="ids" th:value="${course.id}">
                </td>
                <td th:text="${course.id}"></td>
                <td th:text="${course.courseName}"></td>
                <td th:text="${course.price}"></td>
                <td th:text="${course.category != null ? course.category.categoryName : '無'}"></td>
                <td th:text="${course.createdAt}"></td>
                <td th:text="${course.updatedAt}"></td>
                <td>
                    <a th:href="@{/course/edit/{id}(id=${course.id})}"
                       class="btn btn-sm btn-warning">編輯</a>
                    <a th:href="@{/course/delete/{id}(id=${course.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('確定刪除？')">刪除</a>
                </td>
            </tr>
        </tbody>
        </table>

        <nav aria-label="Course pagination">
            <ul class="pagination">
                <li class="page-item"
                    th:classappend="${totalPages == 0 || currentPage == 0} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/course/list(page=0, size=${pageSize})}"
                       aria-label="First">第一頁</a>
                </li>
                <li class="page-item"
                    th:classappend="${totalPages == 0 || currentPage == 0} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/course/list(page=${currentPage - 1}, size=${pageSize})}"
                       aria-label="Previous">上一頁</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link"
                          th:text="'第 ' + (${totalPages == 0 ? 0 : currentPage + 1}) + ' / ' + ${totalPages} + ' 頁'"></span>
                </li>
                <li class="page-item"
                    th:classappend="${totalPages == 0 || currentPage + 1 >= totalPages} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/course/list(page=${currentPage + 1}, size=${pageSize})}"
                       aria-label="Next">下一頁</a>
                </li>
                <li class="page-item"
                    th:classappend="${totalPages == 0 || currentPage + 1 >= totalPages} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/course/list(page=${totalPages - 1}, size=${pageSize})}"
                       aria-label="Last">最後頁</a>
                </li>
            </ul>
        </nav>
    </form>
</div>
</body>
</html>
