<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>類別列表</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2>課程類別列表</h2>
    <a th:href="@{/category/form}" class="btn btn-primary mb-3">新增類別</a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>類別名稱</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.categoryName}"></td>
                <td>
                    <a th:href="@{/category/edit/{id}(id=${cat.id})}"
                       class="btn btn-sm btn-warning">編輯</a>
                    <a th:href="@{/category/delete/{id}(id=${cat.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('確定刪除？')">刪除</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
