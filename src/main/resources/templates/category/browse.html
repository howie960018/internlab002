<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>類別瀏覽</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2>類別瀏覽</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="accordion" id="categoryAccordion">
                <div class="accordion-item" th:each="node, iter : ${categories}">
                    <h2 class="accordion-header" th:attr="id='heading' + ${iter.index}">
                        <button class="accordion-button collapsed" type="button"
                                th:attr="data-bs-toggle='collapse', data-bs-target='#collapse' + ${iter.index}">
                            <span th:text="${node.category.categoryName}"></span>
                        </button>
                    </h2>
                    <div class="accordion-collapse collapse"
                         th:attr="id='collapse' + ${iter.index}"
                         th:classappend="${selectedCategory != null and selectedCategory.parent != null and selectedCategory.parent.id == node.category.id} ? ' show'">
                        <div class="accordion-body">
                            <a class="d-block mb-2"
                               th:href="@{/category/browse(id=${node.category.id})}">查看該類別</a>
                            <div th:each="child : ${node.children}">
                                <a class="d-block ms-2"
                                   th:href="@{/category/browse(id=${child.id})}"
                                   th:text="'-- ' + ${child.categoryName}"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h4 th:text="${selectedCategory != null ? selectedCategory.categoryName : '請選擇類別'}"></h4>

            <table class="table table-bordered" th:if="${courses != null}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>課程名稱</th>
                        <th>價格</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}"></td>
                        <td th:text="${course.courseName}"></td>
                        <td th:text="${course.price}"></td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${courses != null and courses.size() == 0}" class="text-muted">
                目前沒有課程
            </div>
            <nav aria-label="Browse pagination" th:if="${courses != null}">
                <ul class="pagination">
                    <li class="page-item"
                        th:classappend="${totalPages == 0 || currentPage == 0} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/category/browse(id=${selectedCategoryId}, page=0, size=${pageSize})}"
                           aria-label="First">第一頁</a>
                    </li>
                    <li class="page-item"
                        th:classappend="${totalPages == 0 || currentPage == 0} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/category/browse(id=${selectedCategoryId}, page=${currentPage - 1}, size=${pageSize})}"
                           aria-label="Previous">上一頁</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link"
                              th:text="'第 ' + (${totalPages == 0 ? 0 : currentPage + 1}) + ' / ' + ${totalPages} + ' 頁'"></span>
                    </li>
                    <li class="page-item"
                        th:classappend="${totalPages == 0 || currentPage + 1 >= totalPages} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/category/browse(id=${selectedCategoryId}, page=${currentPage + 1}, size=${pageSize})}"
                           aria-label="Next">下一頁</a>
                    </li>
                    <li class="page-item"
                        th:classappend="${totalPages == 0 || currentPage + 1 >= totalPages} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/category/browse(id=${selectedCategoryId}, page=${totalPages - 1}, size=${pageSize})}"
                           aria-label="Last">最後頁</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
